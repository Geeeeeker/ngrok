name: Build ngrok with Custom SSL Certificates

on:
  workflow_dispatch:
    inputs:
      prefix:
        description: '域名前缀（将自动拼接 .dynv6.net）'
        required: true
        type: choice
        options:
          - txddns
          - donghai
          - shanwei
          - guangdong
          - geeker
          - winget
        default: 'txddns'
  schedule:
    - cron: '0 0 */80 * *'

permissions:
  contents: write
  packages: write

env:
  DYNV6_TOKEN: ${{ secrets.DYNV6_TOKEN }}

jobs:
  issue-certs:
    runs-on: ubuntu-latest
    outputs:
      cert_domain: ${{ steps.set-domain.outputs.domain }}
    steps:
      - name: 检查 Token
        run: |
          if [ -z "$DYNV6_TOKEN" ]; then
            echo "❌ 错误：未配置 DYNV6_TOKEN"
            exit 1
          fi
      - name: 确定域名
        id: set-domain
        run: |
          PREFIX="${{ inputs.prefix || 'txddns' }}"
          DOMAIN="${PREFIX}.dynv6.net"
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT
          echo "🌐 目标域名: $DOMAIN"
      - name: 安装 acme.sh
        run: |
          curl https://get.acme.sh | sh -s email=ci-bot@github.com
          echo "$HOME/.acme.sh" >> $GITHUB_PATH
      - name: 申请证书
        run: |
          DOMAIN="${{ steps.set-domain.outputs.domain }}"
          $HOME/.acme.sh/acme.sh --issue \
            --dns dns_dynv6 \
            -d "$DOMAIN" \
            --server letsencrypt \
            --dnssleep 20 \
            --force
          mkdir -p ./certs_output
          $HOME/.acme.sh/acme.sh --install-cert -d "$DOMAIN" \
            --cert-file "./certs_output/device.crt" \
            --key-file "./certs_output/device.key" \
            --ca-file "./certs_output/rootCA.pem" \
            --fullchain-file "./certs_output/fullchain.pem"
          echo "✅ 证书申请成功"
      - name: 上传证书
        uses: actions/upload-artifact@v4
        with:
          name: ssl-certificates
          path: ./certs_output/
          retention-days: 1

  build-and-release:
    needs: issue-certs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            goarch: amd64
            goos: linux
          - os: linux
            arch: arm64
            goarch: arm64
            goos: linux
          - os: darwin
            arch: amd64
            goarch: amd64
            goos: darwin
          - os: windows
            arch: amd64
            goarch: amd64
            goos: windows
          - os: windows
            arch: arm64
            goarch: arm64
            goos: windows

    steps:
      - name: 检出 ngrok 源码
        uses: actions/checkout@v4
        with:
          repository: Geeeeeker/ngrok
          fetch-depth: 0

      - name: 下载证书
        uses: actions/download-artifact@v4
        with:
          name: ssl-certificates
          path: ./certs_temp

      - name: 处理证书并配置域名
        run: |
          DOMAIN="${{ needs.issue-certs.outputs.cert_domain }}"
          echo "NGROK_DOMAIN=$DOMAIN" >> $GITHUB_ENV
          cp -f ./certs_temp/rootCA.pem ./assets/client/tls/ngrokroot.crt
          cp -f ./certs_temp/device.crt ./assets/server/tls/snakeoil.crt
          cp -f ./certs_temp/device.key ./assets/server/tls/snakeoil.key
          echo "✅ 证书已部署，域名: $DOMAIN"
      - name: 严格按照你的方法配置 Go 环境
        run: |
          rm -rf /usr/local/go 
          wget -q -O go.tar.gz https://go.dev/dl/go1.18.1.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go.tar.gz
          export PATH=/usr/local/go/bin:$HOME/go/bin:$PATH
          echo "export PATH=/usr/local/go/bin:$HOME/go/bin:$PATH" >> $HOME/.profile
          source $HOME/.profile
          go version
          go env -w GO111MODULE=on
          go env -w GOPROXY=https://goproxy.cn,direct
          go env -w GO111MODULE=auto
          go install -a -v github.com/go-bindata/go-bindata/...@latest
          echo "✅ Go 环境和 go-bindata 准备完成"
      - name: 强制覆盖下载所有依赖
        run: |
          echo "🧹 强制清理所有旧的依赖目录..."
          rm -rf src/github.com
          rm -rf src/gopkg.in
          mkdir -p src/github.com src/gopkg.in
          
          echo "📥 开始重新克隆依赖..."
          git clone -- https://gitee.com/mirrors/log4go.git src/github.com/alecthomas/log4go
          git clone -- https://gitee.com/ngrok-install/websocket.git src/github.com/gorilla/websocket
          git clone -- https://gitee.com/ngrok-install/go-vhost.git src/github.com/inconshreveable/go-vhost
          git clone -- https://gitee.com/ngrok-install/mousetrap.git src/github.com/inconshreveable/mousetrap
          git clone -- https://gitee.com/ngrok-install/go-bindata.git src/github.com/jteeuwen/go-bindata
          git clone -- https://gitee.com/mirrors_addons/osext.git src/github.com/kardianos/osext
          git clone -- https://gitee.com/ngrok-install/binarydist.git src/github.com/kr/binarydist
          git clone -- https://gitee.com/GoLibs/go-runewidth.git src/github.com/mattn/go-runewidth
          git clone -- https://gitee.com/ngrok-install/termbox-go.git src/github.com/nsf/termbox-go
          git clone -- https://gitee.com/mirrors/go-metrics.git src/github.com/rcrowley/go-metrics
          echo "✅ 所有依赖已强制覆盖克隆完成"
      - name: 编译 (${{ matrix.os }}-${{ matrix.arch }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          echo "🔨 编译 $GOOS/$GOARCH ..."
          export PATH=/usr/local/go/bin:$HOME/go/bin:$PATH
          make release-server
          make release-client
          echo "编译产物:"
          ls -la bin/
      - name: 获取版本号
        id: version
        run: |
          VERSION="v$(date +'%Y.%m.%d-%H%M%S')"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: 打包 deb
        if: matrix.os == 'linux'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          PKG_VER="${VERSION#v}"
          DOMAIN="${{ needs.issue-certs.outputs.cert_domain }}"
          DEB_DIR="ngrok_${PKG_VER}_${ARCH}"
          mkdir -p $DEB_DIR/DEBIAN $DEB_DIR/usr/bin $DEB_DIR/usr/share/doc/ngrok
          
          # 根据平台确定二进制文件路径
          if [ "$ARCH" = "amd64" ]; then
            BIN_DIR="bin"
          else
            BIN_DIR="bin/linux_${ARCH}"
          fi
          
          cp "$BIN_DIR/ngrok" $DEB_DIR/usr/bin/
          cp "$BIN_DIR/ngrokd" $DEB_DIR/usr/bin/ 2>/dev/null || true
          
          # === 创建 README 文件（包含一条命令启动说明） ===
          cat > $DEB_DIR/usr/share/doc/ngrok/README.md << EOF
# ngrok Custom Build for ${DOMAIN}

## 🚀 启动方法（无需 ngrok.cfg）

### 服务端
\`\`\`bash
./ngrokd -domain=${DOMAIN}
\`\`\`

### 客户端
\`\`\`bash
# 基本用法：将本地 8080 端口映射为 myapp 子域名
./ngrok -hostname=myapp.${DOMAIN} 8080

# 或者简写
./ngrok -subdomain=myapp -hostname=${DOMAIN} 8080
\`\`\`

## 📅 构建信息
- 版本: ${VERSION}
- 构建时间: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
- 证书: Let's Encrypt (已内置)
EOF
          
          cat > $DEB_DIR/DEBIAN/control << EOF
          Package: ngrok
          Version: $PKG_VER
          Architecture: $ARCH
          Maintainer: CI Bot <ci-bot@github.com>
          Description: ngrok custom build for ${DOMAIN}
          EOF
          dpkg-deb --build $DEB_DIR
          echo "deb_file=$(basename $DEB_DIR).deb" >> $GITHUB_OUTPUT
      - name: 打包 zip
        if: matrix.os != 'linux'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OS="${{ matrix.os }}"
          ARCH="${{ matrix.arch }}"
          DOMAIN="${{ needs.issue-certs.outputs.cert_domain }}"
          PKG_DIR="ngrok-${OS}-${ARCH}"
          mkdir -p $PKG_DIR
          
          if [ "$OS" = "linux" ]; then
            SRC_DIR="bin"
          else
            SRC_DIR="bin/${OS}_${ARCH}"
          fi
          echo "📂 二进制文件源目录: $SRC_DIR"
          
          if [ -d "$SRC_DIR" ]; then
            cp "$SRC_DIR"/* "$PKG_DIR/" 2>/dev/null || true
          fi
          
          echo "打包目录内容:"
          ls -la "$PKG_DIR/"
          
          # Windows 添加 .exe 后缀
          if [ "$OS" = "windows" ]; then
            for f in "$PKG_DIR"/*; do
              if [ -f "$f" ] && [[ "$f" != *.exe ]] && [[ "$f" != *.txt ]]; then
                mv "$f" "${f}.exe"
                echo "  → 重命名: $(basename "$f") → $(basename "${f}.exe")"
              fi
            done
          fi
          
          # === 创建 README 文件（包含一条命令启动说明） ===
          cat > $PKG_DIR/README.md << EOF
# ngrok Custom Build for ${DOMAIN}

## 🚀 启动方法（无需 ngrok.cfg）

### 服务端
\`\`\`bash
./ngrokd -domain=${DOMAIN}
\`\`\`

### 客户端
\`\`\`bash
# 基本用法：将本地 8080 端口映射为 myapp 子域名
./ngrok -hostname=myapp.${DOMAIN} 8080

# 或者简写
./ngrok -subdomain=myapp -hostname=${DOMAIN} 8080
\`\`\`

## 📅 构建信息
- 版本: ${VERSION}
- 构建时间: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
- 证书: Let's Encrypt (已内置)
EOF
          
          ZIP_FILE="ngrok_${VERSION}_${OS}_${ARCH}.zip"
          zip -r "$ZIP_FILE" "$PKG_DIR"
          echo "✅ 生成: $ZIP_FILE"
      - name: 上传构件
        uses: actions/upload-artifact@v4
        with:
          name: ngrok-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            *.deb
            *.zip
          retention-days: 1

  release:
    needs: [issue-certs, build-and-release]
    runs-on: ubuntu-latest
    steps:
      - name: 获取版本号
        id: version
        run: |
          VERSION="v$(date +'%Y.%m.%d-%H%M%S')"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: 下载所有构件
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets

      - name: 整理文件
        run: |
          mkdir -p ./release-files
          find ./release-assets -type f \( -name "*.deb" -o -name "*.zip" \) -exec cp {} ./release-files/ \;
          ls -lh ./release-files/
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ngrok ${{ needs.issue-certs.outputs.cert_domain }} - ${{ steps.version.outputs.version }}
          body: |
            ## 🚀 ngrok v1 自定义编译版本
            
            **域名**: `${{ needs.issue-certs.outputs.cert_domain }}`
            **证书**: Let's Encrypt (Dynv6 DNS 验证)
            **构建时间**: $(date -u +'%Y.%m.%d-%H%M%S UTC')
            
            ### 🎯 一条命令启动（无需 ngrok.cfg）
            
            **启动服务端：**
            \`\`\`bash
            ./ngrokd -domain=${{ needs.issue-certs.outputs.cert_domain }}
            \`\`\`
            
            **启动客户端：**
            \`\`\`bash
            # 将本地 8080 端口映射为 myapp 子域名
            ./ngrok -hostname=myapp.${{ needs.issue-certs.outputs.cert_domain }} 8080
            
            # 或者简写
            ./ngrok -subdomain=myapp -hostname=${{ needs.issue-certs.outputs.cert_domain }} 8080
            \`\`\`
            
            ### 📦 包含的文件
            
            #### 🐧 Linux (deb 包)
            - \`ngrok_*_amd64.deb\` - x86_64 架构（客户端 + 服务端）
            - \`ngrok_*_arm64.deb\` - ARM64 架构（客户端 + 服务端）
            
            #### 🍎 macOS (zip 包)
            - \`ngrok_*_darwin_amd64.zip\` - Intel 处理器（客户端 + 服务端）
            
            #### 🪟 Windows (zip 包)
            - \`ngrok_*_windows_amd64.zip\` - x86_64 架构（客户端 + 服务端）
            - \`ngrok_*_windows_arm64.zip\` - ARM64 架构（客户端 + 服务端）
            
            ### ⚠️ 注意事项
            - 证书每 80 天自动更新重建
            - 本构建基于 ngrok v1，支持自托管服务端和客户端
            - **证书已编译到二进制文件中，无需额外配置文件**
          files: ./release-files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
