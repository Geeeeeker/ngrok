name: Build ngrok with Custom SSL Certificates

on:
  workflow_dispatch:
    inputs:
      prefix:
        description: '域名前缀（将自动拼接 .dynv6.net）'
        required: true
        type: choice
        options:
          - txddns
          - donghai
          - shanwei
          - guangdong
          - geeker
          - winget
        default: 'txddns'
  schedule:
    - cron: '0 0 */80 * *'

permissions:
  contents: write
  packages: write

env:
  DYNV6_TOKEN: ${{ secrets.DYNV6_TOKEN }}

jobs:
  issue-certs:
    runs-on: ubuntu-latest
    outputs:
      cert_domain: ${{ steps.set-domain.outputs.domain }}
    steps:
      - name: 检查 Token
        run: |
          if [ -z "$DYNV6_TOKEN" ]; then
            echo "❌ 错误：未配置 DYNV6_TOKEN"
            exit 1
          fi

      - name: 确定域名
        id: set-domain
        run: |
          PREFIX="${{ inputs.prefix || 'txddns' }}"
          DOMAIN="${PREFIX}.dynv6.net"
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT
          echo "🌐 域名: $DOMAIN"

      - name: 安装 acme.sh
        run: |
          curl https://get.acme.sh | sh -s email=ci-bot@github.com
          echo "$HOME/.acme.sh" >> $GITHUB_PATH

      - name: 申请证书
        run: |
          DOMAIN="${{ steps.set-domain.outputs.domain }}"
          $HOME/.acme.sh/acme.sh --issue --dns dns_dynv6 -d "$DOMAIN" --server letsencrypt
          mkdir -p ./certs_output
          $HOME/.acme.sh/acme.sh --install-cert -d "$DOMAIN" \
            --cert-file "./certs_output/device.crt" \
            --key-file "./certs_output/device.key" \
            --ca-file "./certs_output/rootCA.pem" \
            --fullchain-file "./certs_output/fullchain.pem"
          echo "✅ 证书申请成功"

      - name: 上传证书
        uses: actions/upload-artifact@v4
        with:
          name: ssl-certificates
          path: ./certs_output/
          retention-days: 1

  build-and-release:
    needs: issue-certs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            goarch: amd64
            goos: linux
            package_type: deb
          - os: linux
            arch: arm64
            goarch: arm64
            goos: linux
            package_type: deb
          - os: darwin
            arch: amd64
            goarch: amd64
            goos: darwin
            package_type: zip
          - os: windows
            arch: amd64
            goarch: amd64
            goos: windows
            package_type: zip
          - os: windows
            arch: arm64
            goarch: arm64
            goos: windows
            package_type: zip

    steps:
      - name: 检出 ngrok 源码
        uses: actions/checkout@v4
        with:
          repository: Geeeeeker/ngrok
          fetch-depth: 0

      - name: 下载证书
        uses: actions/download-artifact@v4
        with:
          name: ssl-certificates
          path: ./certs_temp

      - name: 处理证书并配置域名
        run: |
          # 查看下载的证书文件（调试用）
          echo "📄 下载的证书文件:"
          ls -la ./certs_temp/
          
          # 配置域名（重要：编译时会用到）
          DOMAIN="${{ needs.issue-certs.outputs.cert_domain }}"
          echo "NGROK_DOMAIN=$DOMAIN" >> $GITHUB_ENV
          
          # 直接复制证书到对应位置（文件已由 acme.sh 正确命名）
          cp -f ./certs_temp/rootCA.pem ./assets/client/tls/ngrokroot.crt
          cp -f ./certs_temp/device.crt ./assets/server/tls/snakeoil.crt
          cp -f ./certs_temp/device.key ./assets/server/tls/snakeoil.key
          
          echo "✅ 证书已部署，域名: $DOMAIN"

      - name: 准备 Go 环境并安装 go-bindata
        run: |
          # 1. 严格按照你提供的方法安装 Go 1.18.1
          echo "📥 下载并安装 Go 1.18.1..."
          rm -rf /usr/local/go 
          wget -c https://go.dev/dl/go1.18.1.linux-amd64.tar.gz -O - | sudo tar -xz -C /usr/local
          
          # 2. 设置环境变量
          export PATH=/usr/local/go/bin:$HOME/go/bin:$PATH
          echo "export PATH=/usr/local/go/bin:$HOME/go/bin:$PATH" >> $GITHUB_ENV
          
          go version
          
          # 3. 配置 Go 环境（完全按你提供的命令）
          go env -w GO111MODULE=on
          go env -w GOPROXY=https://goproxy.cn,direct
          go env -w GO111MODULE=auto
          
          # 4. 使用你验证过的命令安装 go-bindata
          echo "📦 安装 go-bindata..."
          go install -a -v github.com/go-bindata/go-bindata/...@latest
          
          # 5. 验证安装
          echo "✅ go-bindata 安装完成"
          which go-bindata 2>/dev/null || find $HOME/go/bin -name "go-bindata" -exec echo "Found: {}" \;

      - name: 编译 (${{ matrix.os }}-${{ matrix.arch }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          echo "🔨 开始编译 $GOOS/$GOARCH ..."
          
          # 关键修复：绕过 Makefile 中的 'go get' 错误
          # 1. 确保我们安装的 go-bindata 在 PATH 中
          export PATH=$HOME/go/bin:$PATH
          
          # 2. 直接在仓库里创建一个假的 bin/go-bindata，骗过 Makefile 的依赖检查
          #    Makefile 检查 bin/go-bindata 是否存在，如果存在就跳过下载
          mkdir -p bin
          cp $(which go-bindata) bin/go-bindata
          chmod +x bin/go-bindata
          echo "✅ go-bindata 已就位，Makefile 将跳过下载"
          
          # 3. 现在可以安全地运行 make 了
          if [ "${{ matrix.package_type }}" = "deb" ]; then
            make release-server
            make release-client
          else
            make release-client
          fi
          
          echo "编译产物:"
          ls -la bin/

      - name: 获取版本号
        id: version
        run: |
          VERSION="v$(date +'%Y.%m.%d-%H%M%S')"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 打包 deb
        if: matrix.package_type == 'deb'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          PKG_VER="${VERSION#v}"
          DEB_DIR="ngrok_${PKG_VER}_${ARCH}"
          mkdir -p $DEB_DIR/DEBIAN $DEB_DIR/usr/bin $DEB_DIR/usr/share/doc/ngrok
          cp bin/ngrok $DEB_DIR/usr/bin/
          cp bin/ngrokd $DEB_DIR/usr/bin/ 2>/dev/null || true
          cat > $DEB_DIR/DEBIAN/control << EOF
          Package: ngrok
          Version: $PKG_VER
          Architecture: $ARCH
          Maintainer: CI Bot <ci-bot@github.com>
          Description: ngrok custom build for ${{ needs.issue-certs.outputs.cert_domain }}
          EOF
          dpkg-deb --build $DEB_DIR
          DEB_FILE="ngrok_${PKG_VER}_${ARCH}.deb"
          mv $DEB_DIR.deb $DEB_FILE
          echo "✅ 生成: $DEB_FILE"

      - name: 打包 zip
        if: matrix.package_type == 'zip'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OS="${{ matrix.os }}"
          ARCH="${{ matrix.arch }}"
          PKG_DIR="ngrok-${OS}-${ARCH}"
          mkdir -p $PKG_DIR
          if [ -f bin/ngrok ]; then cp bin/ngrok $PKG_DIR/; fi
          if [ "$OS" = "windows" ] && [ -f $PKG_DIR/ngrok ]; then mv $PKG_DIR/ngrok $PKG_DIR/ngrok.exe; fi
          cat > $PKG_DIR/README.txt << EOF
          ngrok Custom Build
          Domain: ${{ needs.issue-certs.outputs.cert_domain }}
          Version: $VERSION
          Platform: $OS / $ARCH
          EOF
          ZIP_FILE="ngrok_${VERSION}_${OS}_${ARCH}.zip"
          zip -r "$ZIP_FILE" $PKG_DIR
          echo "✅ 生成: $ZIP_FILE"

      - name: 上传构件
        uses: actions/upload-artifact@v4
        with:
          name: ngrok-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            *.deb
            *.zip
          retention-days: 1

  release:
    needs: [issue-certs, build-and-release]
    runs-on: ubuntu-latest
    steps:
      - name: 获取版本号
        id: version
        run: |
          VERSION="v$(date +'%Y.%m.%d-%H%M%S')"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 下载所有构件
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets

      - name: 整理文件
        run: |
          mkdir -p ./release-files
          find ./release-assets -type f \( -name "*.deb" -o -name "*.zip" \) -exec cp {} ./release-files/ \;
          ls -lh ./release-files/

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ngrok ${{ needs.issue-certs.outputs.cert_domain }} - ${{ steps.version.outputs.version }}
          body: |
            ## 🚀 ngrok v1 自定义编译版本
            **域名**: ${{ needs.issue-certs.outputs.cert_domain }}
            **证书**: Let's Encrypt (Dynv6 DNS 验证)
            **构建时间**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
            ### 使用说明
            - Linux deb 包包含客户端和服务端
            - macOS/Windows zip 包仅包含客户端
            - 证书已内置，启动客户端：`ngrok -hostname="${{ needs.issue-certs.outputs.cert_domain }}" 8080`
          files: ./release-files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
