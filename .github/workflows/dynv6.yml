name: Build ngrok for ngrok.dynv6.net

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */80 * *'

permissions:
  contents: write
  packages: write

env:
  DYNV6_TOKEN: ${{ secrets.DYNV6_TOKEN }}
  DOMAIN: ngrok.dynv6.net

jobs:
  # ========== 申请证书 ==========
  issue-certs:
    runs-on: ubuntu-latest
    steps:
      - name: 检查 Token
        run: |
          if [ -z "$DYNV6_TOKEN" ]; then
            echo "❌ 未配置 DYNV6_TOKEN"
            exit 1
          fi
      - name: 安装 acme.sh
        run: |
          curl https://get.acme.sh | sh -s email=ci-bot@github.com
          echo "$HOME/.acme.sh" >> $GITHUB_PATH
      - name: 申请 & 安装证书
        run: |
          $HOME/.acme.sh/acme.sh --issue --dns dns_dynv6 -d "$DOMAIN" \
            --server letsencrypt --dnssleep 20 --force
          mkdir -p certs_output
          $HOME/.acme.sh/acme.sh --install-cert -d "$DOMAIN" \
            --cert-file certs_output/device.crt \
            --key-file certs_output/device.key \
            --ca-file certs_output/rootCA.pem \
            --fullchain-file certs_output/fullchain.pem
          echo "✅ 证书申请成功"
      - name: 上传证书
        uses: actions/upload-artifact@v4
        with:
          name: ssl-certs
          path: certs_output/
          retention-days: 1

  # ========== 全平台编译 ==========
  build:
    needs: issue-certs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            goarch: amd64
            goos: linux
          - os: linux
            arch: arm64
            goarch: arm64
            goos: linux
          - os: darwin
            arch: amd64
            goarch: amd64
            goos: darwin
          - os: windows
            arch: amd64
            goarch: amd64
            goos: windows
          - os: windows
            arch: arm64
            goarch: arm64
            goos: windows
    steps:
      - name: 检出源码
        uses: actions/checkout@v4
        with:
          repository: Geeeeeker/ngrok
          fetch-depth: 0

      - name: 下载证书
        uses: actions/download-artifact@v4
        with:
          name: ssl-certs
          path: ./certs_temp

      - name: 替换证书并写入域名
        run: |
          cp -f certs_temp/rootCA.pem assets/client/tls/ngrokroot.crt
          cp -f certs_temp/device.crt assets/server/tls/snakeoil.crt
          cp -f certs_temp/device.key assets/server/tls/snakeoil.key
          echo "NGROK_DOMAIN=$DOMAIN" >> $GITHUB_ENV
          echo "✅ 证书已注入，域名: $DOMAIN"

      - name: 配置 Go 1.18
        run: |
          rm -rf /usr/local/go
          wget -q -O go.tar.gz https://go.dev/dl/go1.18.1.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go.tar.gz
          export PATH="/usr/local/go/bin:$HOME/go/bin:$PATH"
          echo "PATH=/usr/local/go/bin:$HOME/go/bin:$PATH" >> $GITHUB_ENV
          go version
          go env -w GO111MODULE=on
          go env -w GOPROXY=https://goproxy.cn,direct
          go env -w GO111MODULE=auto
          go install -a -v github.com/go-bindata/go-bindata/...@latest

      - name: 克隆依赖
        run: |
          rm -rf src/github.com src/gopkg.in
          mkdir -p src/github.com src/gopkg.in
          git clone -- https://gitee.com/mirrors/log4go.git src/github.com/alecthomas/log4go
          git clone -- https://gitee.com/ngrok-install/websocket.git src/github.com/gorilla/websocket
          git clone -- https://gitee.com/ngrok-install/go-vhost.git src/github.com/inconshreveable/go-vhost
          git clone -- https://gitee.com/ngrok-install/mousetrap.git src/github.com/inconshreveable/mousetrap
          git clone -- https://gitee.com/ngrok-install/go-bindata.git src/github.com/jteeuwen/go-bindata
          git clone -- https://gitee.com/mirrors_addons/osext.git src/github.com/kardianos/osext
          git clone -- https://gitee.com/ngrok-install/binarydist.git src/github.com/kr/binarydist
          git clone -- https://gitee.com/GoLibs/go-runewidth.git src/github.com/mattn/go-runewidth
          git clone -- https://gitee.com/ngrok-install/termbox-go.git src/github.com/nsf/termbox-go
          git clone -- https://gitee.com/mirrors/go-metrics.git src/github.com/rcrowley/go-metrics
          echo "✅ 依赖就绪"

      - name: 编译
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          make release-server
          make release-client
          ls -la bin/

      - name: 获取版本号
        id: version
        run: echo "version=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: 打包 (Linux deb)
        if: matrix.os == 'linux'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          PKG_VER="${VERSION#v}"
          DEB_DIR="ngrok-${PKG_VER}-${ARCH}"
          mkdir -p $DEB_DIR/DEBIAN $DEB_DIR/usr/bin $DEB_DIR/usr/share/doc/ngrok

          [ "$ARCH" = "amd64" ] && BIN_DIR="bin" || BIN_DIR="bin/linux_${ARCH}"
          cp "$BIN_DIR/ngrok" $DEB_DIR/usr/bin/
          cp "$BIN_DIR/ngrokd" $DEB_DIR/usr/bin/ 2>/dev/null || true

          cat > $DEB_DIR/usr/share/doc/ngrok/README.md << EOF
          # ngrok for ${DOMAIN}
          ## 启动命令（无需配置文件）
          服务端: ./ngrokd -domain=${DOMAIN}
          客户端: ./ngrok -hostname=myapp.${DOMAIN} 8080
          版本: ${VERSION} | 证书: Let's Encrypt
          EOF

          cat > $DEB_DIR/DEBIAN/control << EOF
          Package: ngrok
          Version: $PKG_VER
          Architecture: $ARCH
          Maintainer: CI Bot
          Description: ngrok for ${DOMAIN}
          EOF

          dpkg-deb --build $DEB_DIR
          echo "✅ 生成 $(ls *.deb)"

      - name: 打包 (非 Linux zip)
        if: matrix.os != 'linux'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OS="${{ matrix.os }}"
          ARCH="${{ matrix.arch }}"
          PKG_DIR="ngrok-${OS}-${ARCH}"
          mkdir -p $PKG_DIR

          SRC_DIR="bin/${OS}_${ARCH}"
          [ -d "$SRC_DIR" ] && cp "$SRC_DIR"/* "$PKG_DIR/" 2>/dev/null || true

          if [ "$OS" = "windows" ]; then
            for f in "$PKG_DIR"/*; do
              [ -f "$f" ] && [[ "$f" != *.exe ]] && [[ "$f" != *.txt ]] && mv "$f" "${f}.exe"
            done
          fi

          cat > $PKG_DIR/README.md << EOF
          # ngrok for ${DOMAIN}
          ## 启动命令
          服务端: ./ngrokd -domain=${DOMAIN}
          客户端: ./ngrok -hostname=myapp.${DOMAIN} 8080
          版本: ${VERSION} | 证书: Let's Encrypt
          EOF

          ZIP_FILE="ngrok-${VERSION}-${OS}-${ARCH}.zip"
          zip -r "$ZIP_FILE" "$PKG_DIR"
          echo "✅ 生成 $ZIP_FILE"

      - name: 上传构件
        uses: actions/upload-artifact@v4
        with:
          name: ngrok-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            *.deb
            *.zip
          retention-days: 1

  # ========== 创建 Release（含 SHA256 校验） ==========
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 取版本时间
        id: version
        run: echo "version=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: 下载所有构件
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 收集文件
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.deb" -o -name "*.zip" \) -exec cp -v {} release-files/ \;
          ls -lh release-files/

      - name: 生成 SHA256 校验文件
        run: |
          cd release-files
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ngrok for ngrok.dynv6.net - ${{ steps.version.outputs.version }}
          body: |
            ## 🚀 ngrok for ngrok.dynv6.net

            **域名**: `ngrok.dynv6.net`
            **证书**: Let's Encrypt (已内置) · 每 80 天自动续期

            ### 一条命令启动（无需配置文件）

            #### 服务端
            ```bash
            ./ngrokd -domain=ngrok.dynv6.net
