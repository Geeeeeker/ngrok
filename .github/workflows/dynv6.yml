name: Build ngrok with Custom SSL Certificates

on:
  workflow_dispatch:
    inputs:
      prefix:
        description: '域名前缀（将自动拼接 .dynv6.net）'
        required: true
        type: choice
        options:
          - txddns
          - donghai
          - shanwei
          - guangdong
          - geeker
          - winget
        default: 'txddns'
  schedule:
    - cron: '0 0 */80 * *'

permissions:
  contents: write
  packages: write

env:
  DYNV6_TOKEN: ${{ secrets.DYNV6_TOKEN }}

jobs:
  issue-certs:
    runs-on: ubuntu-latest
    outputs:
      cert_domain: ${{ steps.set-domain.outputs.domain }}
    steps:
      - name: 检查 Token
        run: |
          if [ -z "$DYNV6_TOKEN" ]; then
            echo "❌ 错误：未配置 DYNV6_TOKEN"
            exit 1
          fi

      - name: 确定域名
        id: set-domain
        run: |
          # 手动触发时使用选择的 prefix，定时触发默认使用 txddns
          PREFIX="${{ inputs.prefix || 'txddns' }}"
          DOMAIN="${PREFIX}.dynv6.net"
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT
          echo "prefix=$PREFIX" >> $GITHUB_OUTPUT
          echo "🌐 目标域名: $DOMAIN"

      - name: 安装 acme.sh
        run: |
          curl https://get.acme.sh | sh -s email=ci-bot@github.com
          echo "$HOME/.acme.sh" >> $GITHUB_PATH

      - name: 申请证书
        run: |
          DOMAIN="${{ steps.set-domain.outputs.domain }}"
          
          echo "🔒 正在为 $DOMAIN 申请证书..."
          
          $HOME/.acme.sh/acme.sh --issue \
            --dns dns_dynv6 \
            -d "$DOMAIN" \
            --server letsencrypt \
            --dnssleep 20 \
            --force
          
          mkdir -p ./certs_output
          
          $HOME/.acme.sh/acme.sh --install-cert -d "$DOMAIN" \
            --cert-file "./certs_output/device.crt" \
            --key-file "./certs_output/device.key" \
            --ca-file "./certs_output/rootCA.pem" \
            --fullchain-file "./certs_output/fullchain.pem"
          
          echo "✅ 证书申请成功"
          echo "证书文件列表:"
          ls -la ./certs_output/

      - name: 上传证书
        uses: actions/upload-artifact@v4
        with:
          name: ssl-certificates
          path: ./certs_output/
          retention-days: 1

  build-and-release:
    needs: issue-certs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            goarch: amd64
            goos: linux
          - os: linux
            arch: arm64
            goarch: arm64
            goos: linux
          - os: darwin
            arch: amd64
            goarch: amd64
            goos: darwin
          - os: windows
            arch: amd64
            goarch: amd64
            goos: windows
          - os: windows
            arch: arm64
            goarch: arm64
            goos: windows

    steps:
      - name: 检出 ngrok 源码
        uses: actions/checkout@v4
        with:
          repository: Geeeeeker/ngrok
          fetch-depth: 0

      - name: 下载证书
        uses: actions/download-artifact@v4
        with:
          name: ssl-certificates
          path: ./certs_temp

      - name: 处理证书并配置域名
        run: |
          DOMAIN="${{ needs.issue-certs.outputs.cert_domain }}"
          
          echo "📄 下载的证书文件:"
          ls -la ./certs_temp/
          
          # 配置域名环境变量
          echo "NGROK_DOMAIN=$DOMAIN" >> $GITHUB_ENV
          
          # 替换仓库中的默认证书
          cp -f ./certs_temp/rootCA.pem ./assets/client/tls/ngrokroot.crt
          cp -f ./certs_temp/device.crt ./assets/server/tls/snakeoil.crt
          cp -f ./certs_temp/device.key ./assets/server/tls/snakeoil.key
          
          echo "✅ 证书已部署，域名: $DOMAIN"

      - name: 严格按照你的方法配置 Go 环境
        run: |
          echo "📥 下载并解压 Go 1.18.1..."
          rm -rf /usr/local/go 
          wget -q -O go.tar.gz https://go.dev/dl/go1.18.1.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go.tar.gz
          
          export PATH=/usr/local/go/bin:$HOME/go/bin:$PATH
          echo "export PATH=/usr/local/go/bin:$HOME/go/bin:$PATH" >> $HOME/.profile
          source $HOME/.profile
          
          go version
          
          go env -w GO111MODULE=on
          go env -w GOPROXY=https://goproxy.cn,direct
          go env -w GO111MODULE=auto
          
          echo "📦 安装 go-bindata..."
          go install -a -v github.com/go-bindata/go-bindata/...@latest
          
          echo "✅ Go 环境和 go-bindata 准备完成"

      - name: 强制覆盖下载所有依赖
        run: |
          echo "🧹 强制清理所有旧的依赖目录..."
          rm -rf src/github.com
          rm -rf src/gopkg.in
          mkdir -p src/github.com src/gopkg.in
          
          echo "📥 开始重新克隆依赖..."
          git clone -- https://gitee.com/mirrors/log4go.git src/github.com/alecthomas/log4go
          git clone -- https://gitee.com/ngrok-install/websocket.git src/github.com/gorilla/websocket
          git clone -- https://gitee.com/ngrok-install/go-vhost.git src/github.com/inconshreveable/go-vhost
          git clone -- https://gitee.com/ngrok-install/mousetrap.git src/github.com/inconshreveable/mousetrap
          git clone -- https://gitee.com/ngrok-install/go-bindata.git src/github.com/jteeuwen/go-bindata
          git clone -- https://gitee.com/mirrors_addons/osext.git src/github.com/kardianos/osext
          git clone -- https://gitee.com/ngrok-install/binarydist.git src/github.com/kr/binarydist
          git clone -- https://gitee.com/GoLibs/go-runewidth.git src/github.com/mattn/go-runewidth
          git clone -- https://gitee.com/ngrok-install/termbox-go.git src/github.com/nsf/termbox-go
          git clone -- https://gitee.com/mirrors/go-metrics.git src/github.com/rcrowley/go-metrics
          echo "✅ 所有依赖已强制覆盖克隆完成"

      - name: 编译 (${{ matrix.os }}-${{ matrix.arch }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          echo "🔨 编译 $GOOS/$GOARCH ..."
          export PATH=/usr/local/go/bin:$HOME/go/bin:$PATH
          make release-server
          make release-client
          echo "编译产物:"
          ls -la bin/

      - name: 获取版本号
        id: version
        run: |
          VERSION="v$(date +'%Y.%m.%d-%H%M%S')"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 打包 deb
        if: matrix.os == 'linux'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          DOMAIN="${{ needs.issue-certs.outputs.cert_domain }}"
          PKG_VER="${VERSION#v}"
          DEB_DIR="ngrok_${PKG_VER}_${ARCH}"
          mkdir -p $DEB_DIR/DEBIAN $DEB_DIR/usr/bin $DEB_DIR/usr/share/doc/ngrok
          
          # 根据架构确定二进制文件路径
          if [ "$ARCH" = "amd64" ]; then
            BIN_DIR="bin"
          else
            BIN_DIR="bin/linux_${ARCH}"
          fi
          
          cp "$BIN_DIR/ngrok" $DEB_DIR/usr/bin/
          cp "$BIN_DIR/ngrokd" $DEB_DIR/usr/bin/ 2>/dev/null || true
          
          # 创建使用说明文件
          cat > $DEB_DIR/usr/share/doc/ngrok/README.txt << EOF
          ngrok Custom Build
          ========================
          Domain    : $DOMAIN
          Version   : $VERSION
          Platform  : linux / $ARCH
          Build Date: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          Cert Type : Let's Encrypt (Dynv6 DNS)
          ========================
          
          ## 🚀 启动命令
          
          ### 服务端 (ngrokd)
          ./ngrokd -domain $DOMAIN
          
          ### 客户端 (ngrok)
          ./ngrok -server_addr="${DOMAIN}:4443" -trust_host_root_certs=false -subdomain=git 8081
          
          ### 参数说明
          -domain              服务端域名（已编译内置证书）
          -server_addr         服务端地址（默认端口4443）
          -trust_host_root_certs=false  跳过证书验证（已内置自签CA）
          -subdomain           自定义子域名前缀
          EOF
          
          cat > $DEB_DIR/DEBIAN/control << EOF
          Package: ngrok
          Version: $PKG_VER
          Architecture: $ARCH
          Maintainer: CI Bot <ci-bot@github.com>
          Description: ngrok custom build for $DOMAIN
           Custom build with Let's Encrypt SSL certificates.
           Usage: ./ngrok -server_addr="${DOMAIN}:4443" -trust_host_root_certs=false -subdomain=git 8081
          EOF
          dpkg-deb --build $DEB_DIR
          DEB_FILE="ngrok_${PKG_VER}_${ARCH}.deb"
          mv $DEB_DIR.deb $DEB_FILE
          echo "✅ 生成: $DEB_FILE"

      - name: 打包 zip
        if: matrix.os != 'linux'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OS="${{ matrix.os }}"
          ARCH="${{ matrix.arch }}"
          DOMAIN="${{ needs.issue-certs.outputs.cert_domain }}"
          PKG_DIR="ngrok-${OS}-${ARCH}"
          mkdir -p $PKG_DIR
          
          BIN_DIR="bin/${OS}_${ARCH}"
          
          if [ -f "$BIN_DIR/ngrok" ]; then
            cp "$BIN_DIR/ngrok" $PKG_DIR/
          fi
          
          if [ "$OS" = "windows" ] && [ -f $PKG_DIR/ngrok ]; then
            mv $PKG_DIR/ngrok $PKG_DIR/ngrok.exe
          fi
          
          # 创建使用说明文件（不包含 ngrok.cfg，因为一条命令即可）
          cat > $PKG_DIR/README.txt << EOF
          ngrok Custom Build
          ========================
          Domain    : $DOMAIN
          Version   : $VERSION
          Platform  : $OS / $ARCH
          Build Date: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          Cert Type : Let's Encrypt (Dynv6 DNS)
          ========================
          
          ## 🚀 启动命令（无需配置文件）
          
          ### 客户端 (ngrok)
          ./ngrok -server_addr="${DOMAIN}:4443" -trust_host_root_certs=false -subdomain=git 8081
          
          ### 参数说明
          -server_addr              服务端地址（默认端口4443）
          -trust_host_root_certs=false  跳过证书验证（已内置自签CA）
          -subdomain                自定义子域名前缀
          
          ### 简化版（使用默认值）
          ./ngrok -server_addr="${DOMAIN}:4443" -trust_host_root_certs=false 8080
          
          ### 更多用法
          ./ngrok -server_addr="${DOMAIN}:4443" -trust_host_root_certs=false -subdomain=web 3000
          ./ngrok -server_addr="${DOMAIN}:4443" -trust_host_root_certs=false -proto=tcp 22
          EOF
          
          ZIP_FILE="ngrok_${VERSION}_${OS}_${ARCH}.zip"
          zip -r "$ZIP_FILE" $PKG_DIR
          echo "✅ 生成: $ZIP_FILE"

      - name: 上传构件
        uses: actions/upload-artifact@v4
        with:
          name: ngrok-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            *.deb
            *.zip
          retention-days: 1

  release:
    needs: [issue-certs, build-and-release]
    runs-on: ubuntu-latest
    steps:
      - name: 获取版本号
        id: version
        run: |
          VERSION="v$(date +'%Y.%m.%d-%H%M%S')"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 下载所有构件
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets

      - name: 整理文件
        run: |
          mkdir -p ./release-files
          find ./release-assets -type f \( -name "*.deb" -o -name "*.zip" \) -exec cp {} ./release-files/ \;
          ls -lh ./release-files/

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ngrok ${{ needs.issue-certs.outputs.cert_domain }} - ${{ steps.version.outputs.version }}
          body: |
            ## 🚀 ngrok v1 自定义编译版本
            
            **🌐 域名**: `${{ needs.issue-certs.outputs.cert_domain }}`
            **📅 构建时间**: $(date -u +'%Y.%m.%d-%H:%M:%S UTC')
            **🔒 证书类型**: Let's Encrypt (Dynv6 DNS 验证)
            **⏰ 证书有效期**: 90 天（自动续期 80 天/次）
            
            ### 📦 包含的文件
            
            #### 🐧 Linux (deb 包)
            - `ngrok_*_amd64.deb` - x86_64 架构（客户端 + 服务端）
            - `ngrok_*_arm64.deb` - ARM64 架构（客户端 + 服务端）
            
            #### 🍎 macOS (zip 包)
            - `ngrok_*_darwin_amd64.zip` - Intel 处理器（仅客户端）
            
            #### 🪟 Windows (zip 包)
            - `ngrok_*_windows_amd64.zip` - x86_64 架构（仅客户端）
            - `ngrok_*_windows_arm64.zip` - ARM64 架构（仅客户端）
            
            ### 🚀 启动命令（无需配置文件，一条命令即可）
            # 转发本地 8080 端口到 web.domain.com
            ./ngrok -server_addr="${{ needs.issue-certs.outputs.cert_domain }}:4443" -trust_host_root_certs=false -subdomain=web 8080
            
            # 转发 TCP 流量（如 SSH）
            ./ngrok -server_addr="${{ needs.issue-certs.outputs.cert_domain }}:4443" -trust_host_root_certs=false -proto=tcp 22
            
            # Windows 系统
            ngrok.exe -server_addr="${{ needs.issue-certs.outputs.cert_domain }}:4443" -trust_host_root_certs=false -subdomain=git 8081
            #### 服务端
            ```bash
            ./ngrokd -domain ${{ needs.issue-certs.outputs.cert_domain }}
          files: ./release-files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
